<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ВПР 4 класс | Грамматический тренажёр — 17 тем</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f0f4fa;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Nunito', sans-serif;
            padding: 20px;
            color: #1e2f3e;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            background: linear-gradient(135deg, #1e6f9f, #42a5f5);
            padding: 15px 25px;
            border-radius: 60px;
            color: white;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.8rem;
        }
        .progress-stats {
            background: #0b3b5f;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
        }
        .exam-btn, .reset-progress {
            background: #ffb74d;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .exam-btn {
            background: #ff9800;
            color: #2c3e2f;
        }
        .reset-progress {
            background: #5c6bc0;
            color: white;
        }
        .exam-btn:hover, .reset-progress:hover {
            transform: scale(0.97);
        }

        /* сетка тем (квадраты) */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        .topic-card {
            background: white;
            border-radius: 32px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            border: 1px solid #dce7f2;
        }
        .topic-card:hover {
            transform: translateY(-6px);
            background: #fff7e8;
        }
        .topic-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
        }
        .topic-title-card {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #0b5e7e;
        }
        .topic-progress-card {
            font-size: 0.8rem;
            background: #eef2ff;
            border-radius: 20px;
            padding: 4px 12px;
            display: inline-block;
            margin-top: 8px;
        }

        /* детальная страница темы */
        .topic-detail {
            background: white;
            border-radius: 48px;
            padding: 25px 30px;
            margin-bottom: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            display: none;
        }
        .topic-detail.active {
            display: block;
        }
        .nav-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }
        .nav-btn {
            background: #e0e7ff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
        }
        .explanation-box {
            background: #fef8e7;
            padding: 20px;
            border-radius: 32px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .rule-table {
            width: 100%;
            border-collapse: collapse;
            background: #fff6e5;
            margin: 15px 0;
            border-radius: 24px;
            overflow: hidden;
        }
        .rule-table th, .rule-table td {
            border: 1px solid #ffda99;
            padding: 8px 12px;
            vertical-align: top;
        }
        .quiz-block {
            background: #f5f9ff;
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
        }
        .quiz-question {
            background: white;
            border-radius: 28px;
            padding: 18px;
            margin: 18px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 12px;
        }
        .options label {
            background: #eef2fa;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
        }
        .check-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 60px;
            font-size: 1rem;
            margin: 15px 0 10px;
            cursor: pointer;
        }
        .result {
            background: #e6f4e6;
            border-radius: 28px;
            padding: 12px;
            margin-top: 15px;
            font-weight: bold;
        }
        .feedback {
            margin-top: 8px;
            font-size: 0.9rem;
        }
        .back-home {
            background: #9e9e9e;
            margin-right: auto;
        }
        footer {
            text-align: center;
            margin: 30px 0 10px;
            color: #6c85a3;
        }
        @media (max-width: 700px) {
            .topic-card {
                padding: 16px;
            }
            .topic-detail {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <h1>📚 ВПР 4 класс | Грамматика</h1>
        <div class="progress-stats" id="globalProgress">⭐ Прогресс: 0%</div>
        <button class="exam-btn" id="openExamBtn">🎯 РЕЖИМ ЭКЗАМЕНА</button>
        <button class="reset-progress" id="resetAllProgress">🔄 Сбросить прогресс</button>
    </div>

    <!-- Главная сетка тем -->
    <div id="topicsGrid" class="topics-grid"></div>

    <!-- Контейнер для детального отображения темы -->
    <div id="topicDetailContainer"></div>

    <footer>✅ Выбери тему → изучи правило → выполни тренировку (5-10 вопросов). Прогресс сохраняется. Режим экзамена: 15 случайных вопросов из всех тем.</footer>
</div>

<script>
    // --------------------------------------------------------------
    // 1. ДАННЫЕ ТЕМ: объяснения + вопросы (по 6-8 вопросов на тему)
    // --------------------------------------------------------------
    const topics = [
        { id: "pos_adj", name: "Притяжат. местоимения", icon: "🧸",
          explanation: `<p><strong>📘 Правило:</strong> показывают, кому принадлежит предмет (перед существительным).</p>
          <table class="rule-table"><tr><th>my</th><th>your</th><th>his</th><th>her</th><th>its</th><th>our</th><th>their</th></tr>
          <tr><td>мой</td><td>твой</td><td>его</td><td>её</td><td>его/её</td><td>наш</td><td>их</td></tr></table>
          <div class="example">✔ This is my bike. ✔ Her name is Kate. ✔ Their house is big.</div>`,
          questions: [
            { text: "I have a sister. ______ name is Ann.", opts: ["My", "Her", "His"], correct: "Her" },
            { text: "We love ______ grandparents.", opts: ["our", "their", "my"], correct: "our" },
            { text: "Tom has a dog. This is ______ dog.", opts: ["her", "its", "his"], correct: "his" },
            { text: "The cat eats ______ food.", opts: ["its", "her", "his"], correct: "its" },
            { text: "They have a new house. ______ house is modern.", opts: ["Their", "Our", "Your"], correct: "Their" },
            { text: "You look nice! Is this ______ jacket?", opts: ["my", "your", "her"], correct: "your" },
            { text: "Mary and I share a room. This is ______ room.", opts: ["our", "their", "my"], correct: "our" }
          ] },
        { id: "poss_noun", name: "Притяжат. падеж ('s)", icon: "🔑",
          explanation: `<p>Принадлежность: Kate’s bag (сумка Кейт), parents’ car (машина родителей), children’s toys (игрушки детей).</p>`,
          questions: [
            { text: "The book of my brother → my ______ book", opts: ["brother’s", "brothers’", "brother"], correct: "brother’s" },
            { text: "The toys of the girls → the ______ toys", opts: ["girls’", "girl’s", "girls"], correct: "girls’" },
            { text: "The bike of William → ______ bike", opts: ["Williams’", "William’s", "William"], correct: "William’s" },
            { text: "The room of the children → the ______ room", opts: ["children’s", "childrens’", "child’s"], correct: "children’s" },
            { text: "The party of my parents → my ______ party", opts: ["parents’", "parent’s", "parents’s"], correct: "parents’" },
            { text: "The name of Kate → ______ name", opts: ["Kates’", "Kate’s", "Kate"], correct: "Kate’s" }
          ] },
        { id: "prep_place", name: "Предлоги места", icon: "📍",
          explanation: `<p>in (внутри), on (на), behind (позади), opposite (напротив), next to (рядом), between (между).</p><div class="example">The pet shop is opposite the cinema.</div>`,
          questions: [
            { text: "The cat is sleeping ______ the sofa (на диване).", opts: ["in", "on", "under"], correct: "on" },
            { text: "The school is ______ the bank and the cinema (между).", opts: ["next to", "between", "opposite"], correct: "between" },
            { text: "He hid ______ the door (позади).", opts: ["behind", "in front of", "next to"], correct: "behind" },
            { text: "The supermarket is ______ the café (напротив).", opts: ["opposite", "next to", "in"], correct: "opposite" },
            { text: "My house is ______ the park (рядом с).", opts: ["opposite", "next to", "behind"], correct: "next to" },
            { text: "The pencils are ______ the pencil case.", opts: ["on", "in", "at"], correct: "in" }
          ] },
        { id: "pres_simple", name: "Present Simple", icon: "⚡",
          explanation: `<p>I/you/we/they + глагол, he/she/it + глагол+s. Отрицание: don't/doesn't. Вопрос: Do/Does</p><div class="example">He plays chess. She doesn't like lemons.</div>`,
          questions: [
            { text: "Fedor ______ volleyball every day.", opts: ["play", "plays", "playing"], correct: "plays" },
            { text: "They ______ to the cinema on Sundays.", opts: ["go", "goes", "going"], correct: "go" },
            { text: "She ______ like tomatoes.", opts: ["don't", "doesn't", "not"], correct: "doesn't" },
            { text: "______ your brother play chess?", opts: ["Do", "Does", "Is"], correct: "Does" },
            { text: "My parents ______ a cat.", opts: ["has", "have", "having"], correct: "have" },
            { text: "It ______ a lot of animals.", opts: ["have", "has", "is"], correct: "has" }
          ] },
        { id: "pres_cont", name: "Present Continuous", icon: "🎬",
          explanation: `<p>am/is/are + глагол+ing (действие сейчас). Listen! She is singing.</p>`,
          questions: [
            { text: "Listen! The baby ______ (cry).", opts: ["cry", "is crying", "are crying"], correct: "is crying" },
            { text: "I ______ (write) an email at the moment.", opts: ["am writing", "write", "writes"], correct: "am writing" },
            { text: "They ______ (play) football now.", opts: ["plays", "are playing", "is playing"], correct: "are playing" },
            { text: "She ______ (not sleep) right now.", opts: ["isn't sleeping", "doesn't sleep", "not sleep"], correct: "isn't sleeping" },
            { text: "Look! The boys ______ (ride) bikes.", opts: ["are riding", "ride", "rides"], correct: "are riding" }
          ] },
        { id: "past_simple", name: "Past Simple", icon: "📆",
          explanation: `<p>Правильные +ed, неправильные 2 форма. got, gave, saw, went. Отрицание: didn't + глагол.</p>`,
          questions: [
            { text: "Larry ______ (get) a new bike yesterday.", opts: ["get", "got", "gotted"], correct: "got" },
            { text: "We ______ (visit) Kazan last summer.", opts: ["visitted", "visited", "visit"], correct: "visited" },
            { text: "She ______ (see) a film yesterday.", opts: ["see", "saw", "seen"], correct: "saw" },
            { text: "They ______ (play) volleyball on Saturday.", opts: ["played", "plaied", "play"], correct: "played" },
            { text: "I ______ (be) at the cinema last night.", opts: ["were", "was", "am"], correct: "was" }
          ] },
        { id: "future_going", name: "to be going to", icon: "🔮",
          explanation: `<p>am/is/are + going to + глагол (собираться). Tomorrow they are going to ride bikes.</p>`,
          questions: [
            { text: "We ______ (visit) grandma next week.", opts: ["are going to visit", "will to visit", "going visit"], correct: "are going to visit" },
            { text: "She ______ (not buy) a new bag.", opts: ["isn't going to buy", "don't go to buy", "will not to buy"], correct: "isn't going to buy" },
            { text: "Larry and Ned ______ (ride) bikes in the park.", opts: ["are going to ride", "is going to ride", "will ride"], correct: "are going to ride" },
            { text: "I ______ (study) English this evening.", opts: ["am going to study", "going to study", "will study"], correct: "am going to study" }
          ] },
        { id: "comparisons", name: "Степени сравнения", icon: "🏆",
          explanation: `<p>old – older – the oldest; good – better – the best; beautiful – more beautiful – the most beautiful.</p>`,
          questions: [
            { text: "My brother is ______ (old) than me.", opts: ["older", "oldest", "more old"], correct: "older" },
            { text: "This zoo is the ______ (big) in Russia.", opts: ["bigger", "biggest", "most big"], correct: "biggest" },
            { text: "This book is ______ (good) than that one.", opts: ["better", "best", "gooder"], correct: "better" },
            { text: "July is ______ (hot) month of the year.", opts: ["the hottest", "hotter", "the most hot"], correct: "the hottest" },
            { text: "This test is ______ (easy) than the last one.", opts: ["easier", "more easy", "easiest"], correct: "easier" }
          ] },
        { id: "there_isare", name: "There is/are", icon: "🏠",
          explanation: `<p>There is + ед.ч., There are + мн.ч. There is a cat. There are five dogs.</p>`,
          questions: [
            { text: "______ many animals in the zoo.", opts: ["There is", "There are", "Is there"], correct: "There are" },
            { text: "______ a cat in the garden.", opts: ["There is", "There are", "Are there"], correct: "There is" },
            { text: "______ any milk in the fridge?", opts: ["Is there", "Are there", "There is"], correct: "Is there" },
            { text: "There ______ a big tree behind the house.", opts: ["is", "are", "am"], correct: "is" }
          ] },
        { id: "question_words", name: "Вопросит. слова", icon: "❓",
          explanation: `<p>Who? (кто), Where? (где), What colour? Whose? (чей), When? (когда), How many?</p>`,
          questions: [
            { text: "______ is this message from? — From Kate.", opts: ["Who", "Whose", "What"], correct: "Who" },
            { text: "______ is the pet shop? — Behind the cinema.", opts: ["Where", "What", "When"], correct: "Where" },
            { text: "______ colour is the bike? — It's black.", opts: ["What", "Which", "How"], correct: "What" },
            { text: "______ birthday is next Tuesday? — Alice’s.", opts: ["Whose", "Who", "When"], correct: "Whose" },
            { text: "______ will Kate come home? — At 6 o'clock.", opts: ["When", "Where", "What time"], correct: "When" }
          ] },
        { id: "numerals", name: "Числительные 1-100", icon: "🔢",
          explanation: `<p><strong>1-12:</strong> one, two, three... twelve; <strong>13-19:</strong> -teen (thirteen, eighteen); <strong>десятки:</strong> twenty, thirty... ninety; <strong>21-99:</strong> twenty-one, thirty-five.</p><div class="example">Fedor is eleven. 45 = forty-five.</div>`,
          questions: [
            { text: "Fedor is 11 years old → eleven", opts: ["eleven", "seven", "twelve"], correct: "eleven" },
            { text: "Liza is 8 → ______", opts: ["eight", "eighty", "eighth"], correct: "eight" },
            { text: "How do you write 33? → ______", opts: ["thirty-three", "thirty three", "thirtythre"], correct: "thirty-three" },
            { text: "99 → ______", opts: ["ninety-nine", "ninety nine", "ninetynine"], correct: "ninety-nine" },
            { text: "15 → ______", opts: ["fifteen", "fiveteen", "fifty"], correct: "fifteen" },
            { text: "100 → ______", opts: ["one hundred", "hundred", "a hundred"], correct: "one hundred" }
          ] },
        { id: "plural", name: "Множеств. число", icon: "📚",
          explanation: `<p>cat→cats, bus→buses, family→families. Исключения: child→children, man→men, tooth→teeth.</p>`,
          questions: [
            { text: "one child — many ______", opts: ["children", "childs", "childes"], correct: "children" },
            { text: "one cat — two ______", opts: ["cats", "cates", "cat"], correct: "cats" },
            { text: "one man — two ______", opts: ["men", "mans", "man"], correct: "men" },
            { text: "one family — three ______", opts: ["families", "familys", "familyies"], correct: "families" }
          ] },
        { id: "prep_time", name: "Предлоги времени", icon: "⏰",
          explanation: `<p>in + месяц/год/сезон (in summer), on + день (on Monday), at + час (at 5 o'clock).</p>`,
          questions: [
            { text: "I go to school ______ Monday.", opts: ["on", "in", "at"], correct: "on" },
            { text: "My birthday is ______ March.", opts: ["in", "on", "at"], correct: "in" },
            { text: "The party starts ______ 7 o'clock.", opts: ["at", "in", "on"], correct: "at" },
            { text: "We play football ______ the afternoon.", opts: ["in", "on", "at"], correct: "in" }
          ] },
        { id: "articles", name: "Артикли a/an/the", icon: "🔖",
          explanation: `<p>a (перед согласным), an (перед гласным), the (конкретный предмет). An apple, the sun.</p>`,
          questions: [
            { text: "I have ______ apple.", opts: ["a", "an", "the"], correct: "an" },
            { text: "This is ______ bike that Larry got.", opts: ["a", "an", "the"], correct: "the" },
            { text: "She is ______ best pupil.", opts: ["a", "an", "the"], correct: "the" },
            { text: "I want to be ______ vet.", opts: ["a", "an", "the"], correct: "a" }
          ] },
        { id: "negation", name: "Отрицание (not)", icon: "🚫",
          explanation: `<p>don't/doesn't (Present Simple), isn't/aren't (Present Continuous), didn't (Past Simple).</p>`,
          questions: [
            { text: "She ______ like lemons.", opts: ["doesn't", "don't", "isn't"], correct: "doesn't" },
            { text: "They ______ playing tennis now.", opts: ["aren't", "isn't", "don't"], correct: "aren't" },
            { text: "He ______ come to the party yesterday.", opts: ["didn't", "doesn't", "wasn't"], correct: "didn't" }
          ] },
        { id: "conjunctions", name: "Союзы (and, but, or, because)", icon: "🔗",
          explanation: `<p>and (и), but (но), or (или), because (потому что). He is happy because he got a bike.</p>`,
          questions: [
            { text: "I like apples ______ bananas.", opts: ["and", "but", "or"], correct: "and" },
            { text: "She likes pears ______ she doesn't like lemons.", opts: ["but", "and", "because"], correct: "but" },
            { text: "He is wet ______ it is raining.", opts: ["because", "but", "or"], correct: "because" }
          ] },
        { id: "word_order", name: "Порядок слов", icon: "📝",
          explanation: `<p>Подлежащее + сказуемое + дополнение + обстоятельство. Вопрос: вспом.глагол + подлежащее + глагол.</p>`,
          questions: [
            { text: "Выбери правильный порядок: (Larry / rides / his bike / every day)", opts: ["Larry rides his bike every day", "Rides Larry his bike every day", "His bike Larry rides"], correct: "Larry rides his bike every day" },
            { text: "Вопрос: (you / do / like / pizza?)", opts: ["Do you like pizza?", "You do like pizza?", "Like you do pizza?"], correct: "Do you like pizza?" }
          ] }
    ];

    // Прогресс: { topicId: { total: number, correct: number } }
    let progress = {};

    // Загрузка/сохранение
    function loadProgress() {
        const saved = localStorage.getItem("vpr4_grammar_progress");
        if(saved) progress = JSON.parse(saved);
        else progress = {};
        updateGlobalProgress();
    }
    function saveProgress() {
        localStorage.setItem("vpr4_grammar_progress", JSON.stringify(progress));
        updateGlobalProgress();
    }
    function updateGlobalProgress() {
        let totalCorrect = 0, totalAnswered = 0;
        for(let id in progress) {
            totalCorrect += progress[id].correct || 0;
            totalAnswered += progress[id].total || 0;
        }
        let percent = totalAnswered === 0 ? 0 : Math.round((totalCorrect/totalAnswered)*100);
        document.getElementById("globalProgress").innerHTML = `⭐ Прогресс: ${percent}% (${totalCorrect}/${totalAnswered})`;
        // обновить карточки
        document.querySelectorAll(".topic-progress-card").forEach(card => {
            const tid = card.dataset.id;
            const p = progress[tid] || { total:0, correct:0 };
            const pct = p.total === 0 ? 0 : Math.round((p.correct/p.total)*100);
            card.innerText = `📊 ${pct}% (${p.correct}/${p.total})`;
        });
    }
    function addAttempts(topicId, correctCount, totalAttempted) {
        if(!progress[topicId]) progress[topicId] = { total:0, correct:0 };
        progress[topicId].total += totalAttempted;
        progress[topicId].correct += correctCount;
        saveProgress();
    }

    // Перемешивание
    function shuffleArray(arr) {
        for(let i=arr.length-1;i>0;i--) {
            const j = Math.floor(Math.random()*(i+1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Рендер сетки тем
    function renderGrid() {
        const grid = document.getElementById("topicsGrid");
        grid.innerHTML = "";
        topics.forEach(t => {
            const p = progress[t.id] || { total:0, correct:0 };
            const percent = p.total===0?0:Math.round((p.correct/p.total)*100);
            const card = document.createElement("div");
            card.className = "topic-card";
            card.innerHTML = `
                <div class="topic-icon">${t.icon}</div>
                <div class="topic-title-card">${t.name}</div>
                <div class="topic-progress-card" data-id="${t.id}">📊 ${percent}% (${p.correct}/${p.total})</div>
            `;
            card.addEventListener("click", () => openTopic(t.id));
            grid.appendChild(card);
        });
    }

    // Открыть тему
    function openTopic(topicId) {
        const topic = topics.find(t => t.id === topicId);
        if(!topic) return;
        const container = document.getElementById("topicDetailContainer");
        container.innerHTML = "";
        const detailDiv = document.createElement("div");
        detailDiv.className = "topic-detail active";
        detailDiv.id = `detail-${topicId}`;
        // генерируем перемешанные вопросы
        let questions = shuffleArray([...topic.questions]);
        detailDiv.innerHTML = `
            <div class="nav-buttons">
                <button class="nav-btn back-home">🏠 На главную</button>
                <button class="nav-btn back-grid">⬅ Назад к темам</button>
            </div>
            <h2>📖 ${topic.name} ${topic.icon}</h2>
            <div class="explanation-box">${topic.explanation}</div>
            <div class="quiz-block">
                <h3>✏️ Тренировка (${questions.length} вопросов)</h3>
                <div id="quiz-${topicId}"></div>
                <button class="check-btn" data-topic="${topicId}">✅ Проверить всё</button>
                <div id="result-${topicId}" class="result"></div>
            </div>
        `;
        container.appendChild(detailDiv);
        // рендерим вопросы
        const quizContainer = detailDiv.querySelector(`#quiz-${topicId}`);
        let qHtml = "";
        questions.forEach((q, idx) => {
            qHtml += `<div class="quiz-question" data-qidx="${idx}">
                        <p>${idx+1}. ${q.text}</p>
                        <div class="options">`;
            q.opts.forEach(opt => {
                qHtml += `<label><input type="radio" name="q_${topicId}_${idx}" value="${opt}"> ${opt}</label>`;
            });
            qHtml += `</div><div class="feedback" id="fb_${topicId}_${idx}"></div></div>`;
        });
        quizContainer.innerHTML = qHtml;
        const checkBtn = detailDiv.querySelector(".check-btn");
        checkBtn.addEventListener("click", () => {
            let correctCount = 0;
            let attempted = 0;
            questions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="q_${topicId}_${idx}"]:checked`);
                const fb = document.getElementById(`fb_${topicId}_${idx}`);
                if(selected) {
                    attempted++;
                    if(selected.value === q.correct) {
                        correctCount++;
                        fb.innerHTML = "✅ Верно!";
                        fb.style.color = "green";
                    } else {
                        fb.innerHTML = `❌ Ошибка. Правильно: ${q.correct}`;
                        fb.style.color = "red";
                    }
                } else {
                    fb.innerHTML = "⚠️ Не выбран ответ";
                    fb.style.color = "orange";
                }
            });
            if(attempted > 0) addAttempts(topicId, correctCount, attempted);
            const resDiv = detailDiv.querySelector(`#result-${topicId}`);
            resDiv.innerHTML = `🎯 Результат: ${correctCount} из ${questions.length} (отвечено ${attempted})`;
        });
        // навигация
        detailDiv.querySelectorAll(".back-home, .back-grid").forEach(btn => {
            btn.addEventListener("click", () => {
                container.innerHTML = "";
                renderGrid();
                document.getElementById("topicsGrid").style.display = "grid";
            });
        });
        document.getElementById("topicsGrid").style.display = "none";
    }

    // РЕЖИМ ЭКЗАМЕНА (15 случайных вопросов из всех тем)
    function startExam() {
        let allQuestions = [];
        topics.forEach(topic => {
            topic.questions.forEach(q => {
                allQuestions.push({ ...q, sourceTopic: topic.id, topicName: topic.name });
            });
        });
        let examQuestions = shuffleArray([...allQuestions]).slice(0, 15);
        const modal = document.createElement("div");
        modal.id = "examModal";
        modal.style.position = "fixed";
        modal.style.top = "5%";
        modal.style.left = "5%";
        modal.style.width = "90%";
        modal.style.maxWidth = "900px";
        modal.style.maxHeight = "85vh";
        modal.style.overflow = "auto";
        modal.style.backgroundColor = "white";
        modal.style.borderRadius = "48px";
        modal.style.padding = "25px";
        modal.style.zIndex = "1000";
        modal.style.boxShadow = "0 20px 35px black";
        modal.style.border = "4px solid #ff9800";
        const close = () => modal.remove();
        modal.innerHTML = `<div style="display:flex; justify-content:space-between;"><h2>📝 РЕЖИМ ЭКЗАМЕНА (15 вопросов)</h2><button id="closeExam" style="background:#d32f2f; border:none; padding:6px 16px; border-radius:30px; color:white;">✖ Закрыть</button></div><div id="examContent"></div>`;
        document.body.appendChild(modal);
        const examContainer = modal.querySelector("#examContent");
        let qHtml = `<div class="quiz-questions-container">`;
        examQuestions.forEach((q, idx) => {
            qHtml += `<div class="quiz-question"><p><strong>${idx+1}. [${q.topicName}]</strong> ${q.text}</p><div class="options">`;
            q.opts.forEach(opt => {
                qHtml += `<label><input type="radio" name="examQ${idx}" value="${opt}"> ${opt}</label>`;
            });
            qHtml += `</div><div class="feedback" id="examFb${idx}"></div></div>`;
        });
        qHtml += `<button id="examCheckBtn" class="check-btn">✅ Завершить экзамен</button><div id="examResult" class="result"></div></div>`;
        examContainer.innerHTML = qHtml;
        document.getElementById("closeExam").addEventListener("click", close);
        document.getElementById("examCheckBtn").addEventListener("click", () => {
            let correctCount = 0;
            let attemptedAll = 0;
            examQuestions.forEach((q, idx) => {
                const selected = document.querySelector(`input[name="examQ${idx}"]:checked`);
                const fb = document.getElementById(`examFb${idx}`);
                if(selected) {
                    attemptedAll++;
                    if(selected.value === q.correct) {
                        correctCount++;
                        fb.innerHTML = "✅ Верно!";
                        fb.style.color = "green";
                    } else {
                        fb.innerHTML = `❌ Ошибка. Ответ: ${q.correct}`;
                        fb.style.color = "red";
                    }
                } else fb.innerHTML = "⚡ Нет ответа";
            });
            document.getElementById("examResult").innerHTML = `🎓 Экзамен: ${correctCount} из ${examQuestions.length} правильных (отвечено ${attemptedAll})`;
            // прогресс в темы не добавляем, только тренировка.
        });
    }

    // Сброс прогресса
    document.getElementById("resetAllProgress").addEventListener("click", () => {
        if(confirm("Сбросить весь прогресс по всем темам?")) {
            progress = {};
            saveProgress();
            renderGrid();
            if(document.getElementById("topicsGrid").style.display !== "grid") {
                document.getElementById("topicDetailContainer").innerHTML = "";
                renderGrid();
                document.getElementById("topicsGrid").style.display = "grid";
            } else renderGrid();
        }
    });
    document.getElementById("openExamBtn").addEventListener("click", startExam);

    // инициализация
    loadProgress();
    renderGrid();
    document.getElementById("topicsGrid").style.display = "grid";
</script>
</body>
</html>
