<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный тест · Грамматика к ВПР (4 класс)</title>
    <style>
        :root {
            --primary: #1e6f9f;
            --primary-light: #42a5f5;
            --accent: #ff9800;
            --success: #2e7d32;
            --error: #c62828;
            --bg: #f5f9ff;
            --card-bg: #ffffff;
            --text: #1e2f3e;
            --border: #e0e0e0;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 30px 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            display: inline-block;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            margin-bottom: 25px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .toc {
            background: var(--card-bg);
            border-radius: 40px;
            padding: 20px 25px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .toc h2 {
            font-size: 1.6rem;
            margin-bottom: 15px;
            color: #0b5e7e;
        }
        .toc-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .toc-link {
            background: #eef2fa;
            padding: 8px 18px;
            border-radius: 40px;
            text-decoration: none;
            color: #1e4663;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.95rem;
            display: inline-block;
            border: none;
            cursor: pointer;
        }
        .toc-link:hover {
            background: #ffd966;
            transform: translateY(-2px);
        }
        .rule-card {
            background: var(--card-bg);
            border-radius: 42px;
            margin-bottom: 45px;
            padding: 28px 32px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
            transition: 0.2s;
            scroll-margin-top: 20px;
        }
        .rule-title {
            font-size: 1.9rem;
            font-weight: 800;
            color: #0b5e7e;
            border-left: 12px solid var(--accent);
            padding-left: 20px;
            margin-bottom: 20px;
        }
        .question {
            background: #f9fbfd;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            margin: 12px 0;
        }
        .question p {
            font-weight: 600;
            margin-bottom: 8px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 8px 0;
        }
        .option {
            background: #fff;
            border: 2px solid #d0d9e0;
            border-radius: 30px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.15s;
            user-select: none;
        }
        .option:hover {
            background: #eef2fa;
        }
        .option.selected {
            border-color: var(--primary);
            background: #e3f2fd;
        }
        .option.correct {
            background: #e8f5e9;
            border-color: var(--success);
        }
        .option.wrong {
            background: #ffebee;
            border-color: var(--error);
        }
        .feedback {
            font-size: 0.9rem;
            margin-top: 8px;
            font-weight: 600;
        }
        .feedback.correct {
            color: var(--success);
        }
        .feedback.wrong {
            color: var(--error);
        }
        .result-panel {
            background: white;
            border-radius: 30px;
            padding: 24px;
            margin: 30px 0;
            text-align: center;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            font-size: 1.3rem;
        }
        .result-panel h3 {
            margin-bottom: 12px;
        }
        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
        }
        .btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.1);
            transition: 0.15s;
        }
        .btn:hover {
            background: #0b5e7e;
            transform: translateY(-1px);
        }
        .btn.reset {
            background: #6c757d;
        }
        .btn.reset:hover {
            background: #495057;
        }
        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #6c85a3;
            border-top: 1px solid #dce5f0;
        }
        @media (max-width: 700px) {
            .rule-card {
                padding: 18px;
            }
            .rule-title {
                font-size: 1.5rem;
            }
            .options {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>🧪 Интерактивный тест<br>Грамматика ВПР · 60 вопросов</h1>

    <!-- Оглавление -->
    <div class="toc">
        <h2>📚 Темы</h2>
        <div class="toc-grid" id="tocNav"></div>
    </div>

    <div id="questionsContainer"></div>

    <div class="result-panel" id="resultPanel" style="display: none;">
        <h3>Результат</h3>
        <p>Правильных ответов: <span id="correctCount">0</span> из 60</p>
        <p>Процент: <span id="percent">0</span>%</p>
    </div>

    <div class="actions">
        <button class="btn" id="checkBtn">✅ Проверить всё</button>
        <button class="btn reset" id="resetBtn">🔄 Сбросить</button>
    </div>
    <footer>📚 По материалам справочника «Грамматика 4 класс · ВПР»</footer>
</div>

<script>
    (function() {
        // Массив вопросов, сгруппированных по темам
        const topics = [
            {
                id: "topic1",
                title: "1. Притяжательные местоимения (my, your, his, her, its, our, their)",
                questions: [
                    { q: "This is ___ book. (I)", opts: ["my", "your", "his", "her"], ans: 0 },
                    { q: "Перевод «их дом»:", opts: ["my house", "your house", "his house", "their house"], ans: 3 },
                    { q: "Какое местоимение значит «твой, ваш»?", opts: ["my", "your", "his", "her"], ans: 1 },
                    { q: "Перевод «её кошка»:", opts: ["my cat", "your cat", "his cat", "her cat"], ans: 3 }
                ]
            },
            {
                id: "topic2",
                title: "2. Притяжательный падеж существительных ('s)",
                questions: [
                    { q: "Сумка Кейт:", opts: ["Kate bag", "Kates bag", "Kate's bag", "bag Kate"], ans: 2 },
                    { q: "Машина родителей (мн. ч.):", opts: ["parents car", "parent's car", "parents' car", "parents's car"], ans: 2 },
                    { q: "Комната детей:", opts: ["childrens room", "children's room", "childrens' room", "child's room"], ans: 1 }
                ]
            },
            {
                id: "topic3",
                title: "3. Предлоги места (in, on, behind, opposite, next to, between)",
                questions: [
                    { q: "Кошка находится ... столе.", opts: ["in", "on", "behind", "next to"], ans: 1 },
                    { q: "Парк находится ... школы.", opts: ["in", "on", "opposite", "between"], ans: 2 },
                    { q: "Мяч лежит ... коробкой.", opts: ["in", "on", "behind", "next to"], ans: 2 },
                    { q: "Библиотека находится ... банком и кинотеатром.", opts: ["in", "on", "between", "next to"], ans: 2 }
                ]
            },
            {
                id: "topic4",
                title: "4. Настоящее простое время (Present Simple)",
                questions: [
                    { q: "She ___ to school every day. (go)", opts: ["go", "goes", "going", "gone"], ans: 1 },
                    { q: "They ___ football on Sundays. (play)", opts: ["plays", "play", "playing", "played"], ans: 1 },
                    { q: "He ___ like lemons. (not)", opts: ["don't like", "doesn't like", "not like", "isn't like"], ans: 1 },
                    { q: "___ you play chess?", opts: ["Does", "Do", "Is", "Are"], ans: 1 }
                ]
            },
            {
                id: "topic5",
                title: "5. Настоящее длительное время (Present Continuous)",
                questions: [
                    { q: "Look! The baby ___ (cry).", opts: ["cries", "is crying", "cried", "crying"], ans: 1 },
                    { q: "We ___ dinner at the moment. (have)", opts: ["have", "has", "are having", "is having"], ans: 2 },
                    { q: "The boys ___ their bikes now. (ride)", opts: ["ride", "rides", "are riding", "is riding"], ans: 2 }
                ]
            },
            {
                id: "topic6",
                title: "6. Прошедшее простое время (Past Simple)",
                questions: [
                    { q: "Larry ___ a new bike yesterday. (get)", opts: ["gets", "got", "getted", "getting"], ans: 1 },
                    { q: "We ___ the Kazan Kremlin last summer. (visit)", opts: ["visit", "visits", "visited", "visiting"], ans: 2 },
                    { q: "She ___ a film yesterday. (see)", opts: ["sees", "saw", "seen", "seeing"], ans: 1 },
                    { q: "He ___ like the soup. (not)", opts: ["don't like", "doesn't like", "didn't like", "not liked"], ans: 2 }
                ]
            },
            {
                id: "topic7",
                title: "7. Будущее время (to be going to)",
                questions: [
                    { q: "I am ___ study English.", opts: ["go to", "going to", "going", "go"], ans: 1 },
                    { q: "She ___ buy a new bag.", opts: ["is going to", "are going to", "going to", "is go to"], ans: 0 },
                    { q: "They are ___ ride bikes tomorrow.", opts: ["go to", "going to", "going", "go"], ans: 1 }
                ]
            },
            {
                id: "topic8",
                title: "8. Степени сравнения прилагательных",
                questions: [
                    { q: "This zoo is the ___ in Russia. (old)", opts: ["older", "oldest", "most old", "old"], ans: 1 },
                    { q: "This book is ___ than that one. (good)", opts: ["gooder", "better", "best", "more good"], ans: 1 },
                    { q: "She is the ___ girl in class. (tall)", opts: ["taller", "tallest", "most tall", "tall"], ans: 1 },
                    { q: "This task is ___ than the previous one. (difficult)", opts: ["difficult", "more difficult", "most difficult", "difficulter"], ans: 1 }
                ]
            },
            {
                id: "topic9",
                title: "9. Оборот There is / There are",
                questions: [
                    { q: "___ a cat in the garden.", opts: ["There is", "There are", "It is", "Is there"], ans: 0 },
                    { q: "___ many animals in the zoo.", opts: ["There is", "There are", "It is", "Are there"], ans: 1 },
                    { q: "___ a supermarket opposite the cinema?", opts: ["Is there", "Are there", "There is", "Is it"], ans: 0 }
                ]
            },
            {
                id: "topic10",
                title: "10. Вопросительные слова",
                questions: [
                    { q: "___ is this message from?", opts: ["Who", "Where", "What", "When"], ans: 0 },
                    { q: "___ colour is the bike?", opts: ["Who", "Where", "What", "Whose"], ans: 2 },
                    { q: "___ birthday is next Tuesday?", opts: ["Who", "Whose", "When", "How"], ans: 1 },
                    { q: "___ many children are in the family?", opts: ["Who", "What", "How", "Where"], ans: 2 }
                ]
            },
            {
                id: "topic11",
                title: "11. Числительные 1–100 (словами)",
                questions: [
                    { q: "Напишите число 15 словом:", opts: ["fiveteen", "fifteen", "fifteeen", "fifthteen"], ans: 1 },
                    { q: "Число 40 пишется как:", opts: ["fourty", "forty", "fourtee", "forteen"], ans: 1 },
                    { q: "23 пишется как:", opts: ["twenty-three", "twenty three", "twentey-three", "twenty-thre"], ans: 0 },
                    { q: "100 пишется как:", opts: ["hundred", "one hundred", "one-hundred", "hundreed"], ans: 1 }
                ]
            },
            {
                id: "topic12",
                title: "12. Множественное число существительных",
                questions: [
                    { q: "Множественное число для «box»:", opts: ["boxs", "boxes", "boxies", "box"], ans: 1 },
                    { q: "Множественное число для «family»:", opts: ["families", "familys", "familyes", "families"], ans: 0 },
                    { q: "Множественное число для «child»:", opts: ["childs", "children", "childes", "childrens"], ans: 1 },
                    { q: "Множественное число для «tooth»:", opts: ["tooths", "teeth", "toothes", "teeths"], ans: 1 }
                ]
            },
            {
                id: "topic13",
                title: "13. Предлоги времени (in, on, at)",
                questions: [
                    { q: "I go to school ___ Monday.", opts: ["in", "on", "at", "by"], ans: 1 },
                    { q: "My birthday is ___ March.", opts: ["in", "on", "at", "by"], ans: 0 },
                    { q: "The lesson starts ___ 8:30 am.", opts: ["in", "on", "at", "by"], ans: 2 }
                ]
            },
            {
                id: "topic14",
                title: "14. Артикли (a, an, the)",
                questions: [
                    { q: "I have ___ bike.", opts: ["a", "an", "the", "-"], ans: 0 },
                    { q: "She is ___ excellent pupil.", opts: ["a", "an", "the", "-"], ans: 1 },
                    { q: "Look at ___ sun.", opts: ["a", "an", "the", "-"], ans: 2 }
                ]
            },
            {
                id: "topic15",
                title: "15. Отрицательная частица not (don't / doesn't / didn't / isn't / aren't)",
                questions: [
                    { q: "She ___ like lemons.", opts: ["don't", "doesn't", "isn't", "aren't"], ans: 1 },
                    { q: "They ___ playing now.", opts: ["don't", "doesn't", "isn't", "aren't"], ans: 3 },
                    { q: "He ___ come yesterday.", opts: ["don't", "doesn't", "didn't", "isn't"], ans: 2 },
                    { q: "I ___ a teacher.", opts: ["am not", "isn't", "aren't", "don't"], ans: 0 }
                ]
            },
            {
                id: "topic16",
                title: "16. Союзы (and, but, or, because)",
                questions: [
                    { q: "I like apples ___ bananas.", opts: ["and", "but", "or", "because"], ans: 0 },
                    { q: "She likes pears ___ she doesn't like lemons.", opts: ["and", "but", "or", "because"], ans: 1 },
                    { q: "He is happy ___ he got a new bike.", opts: ["and", "but", "or", "because"], ans: 3 }
                ]
            },
            {
                id: "topic17",
                title: "17. Порядок слов в предложении",
                questions: [
                    { q: "Утверждение: Подлежащее → сказуемое → дополнение → обстоятельство. Выберите правильный порядок:", opts: ["Larry his bike rides in the park.", "Larry rides his bike in the park.", "In the park Larry rides his bike.", "Rides Larry his bike in the park."], ans: 1 },
                    { q: "Общий вопрос: Вспомогательный глагол → подлежащее → смысловой глагол → ... Выберите правильный вопрос:", opts: ["Larry does ride his bike?", "Does Larry ride his bike?", "Larry ride his bike does?", "Ride Larry his bike does?"], ans: 1 },
                    { q: "Отрицание: Подлежащее → вспомогательный глагол + not → смысловой глагол → ... Выберите правильное отрицание:", opts: ["Larry not does ride his bike.", "Larry does not ride his bike.", "Not Larry does ride his bike.", "Larry ride not does his bike."], ans: 1 }
                ]
            }
        ];

        const app = document.getElementById('app');
        const tocNav = document.getElementById('tocNav');
        const questionsContainer = document.getElementById('questionsContainer');
        const resultPanel = document.getElementById('resultPanel');
        const correctSpan = document.getElementById('correctCount');
        const percentSpan = document.getElementById('percent');
        const checkBtn = document.getElementById('checkBtn');
        const resetBtn = document.getElementById('resetBtn');

        // Генерация навигации и контента
        function render() {
            tocNav.innerHTML = '';
            questionsContainer.innerHTML = '';

            topics.forEach((topic, topicIndex) => {
                // Ссылка в оглавлении
                const link = document.createElement('a');
                link.className = 'toc-link';
                link.href = `#${topic.id}`;
                link.textContent = topic.title.split('.')[0] + '. ' + topic.title.split('. ')[1];
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.getElementById(topic.id).scrollIntoView({ behavior: 'smooth' });
                });
                tocNav.appendChild(link);

                // Карточка темы
                const card = document.createElement('div');
                card.className = 'rule-card';
                card.id = topic.id;
                const title = document.createElement('div');
                title.className = 'rule-title';
                title.textContent = topic.title;
                card.appendChild(title);

                topic.questions.forEach((q, qIndex) => {
                    const questionDiv = document.createElement('div');
                    questionDiv.className = 'question';
                    questionDiv.innerHTML = `<p>${q.q}</p>`;
                    const optionsDiv = document.createElement('div');
                    optionsDiv.className = 'options';

                    q.opts.forEach((opt, optIndex) => {
                        const optBtn = document.createElement('span');
                        optBtn.className = 'option';
                        optBtn.textContent = opt;
                        optBtn.dataset.topic = topicIndex;
                        optBtn.dataset.question = qIndex;
                        optBtn.dataset.option = optIndex;
                        optBtn.addEventListener('click', optionClickHandler);
                        optionsDiv.appendChild(optBtn);
                    });

                    const feedbackDiv = document.createElement('div');
                    feedbackDiv.className = 'feedback';
                    feedbackDiv.style.display = 'none';
                    feedbackDiv.dataset.topic = topicIndex;
                    feedbackDiv.dataset.question = qIndex;

                    questionDiv.appendChild(optionsDiv);
                    questionDiv.appendChild(feedbackDiv);
                    card.appendChild(questionDiv);
                });

                questionsContainer.appendChild(card);
            });
        }

        // Обработчик выбора ответа
        function optionClickHandler(e) {
            const option = e.currentTarget;
            const topicIdx = parseInt(option.dataset.topic);
            const qIdx = parseInt(option.dataset.question);
            const questionData = topics[topicIdx].questions[qIdx];
            const selectedOpt = parseInt(option.dataset.option);
            const correctOpt = questionData.ans;

            // Убрать выделение со всех опций этого вопроса
            const parentOpts = option.parentElement.querySelectorAll('.option');
            parentOpts.forEach(opt => opt.classList.remove('selected', 'correct', 'wrong'));

            // Выделить выбранную
            option.classList.add('selected');

            // Показать обратную связь
            const feedback = option.closest('.question').querySelector('.feedback');
            if (selectedOpt === correctOpt) {
                option.classList.add('correct');
                feedback.textContent = '✅ Правильно!';
                feedback.className = 'feedback correct';
            } else {
                option.classList.add('wrong');
                // Подсветить правильный ответ
                parentOpts[correctOpt].classList.add('correct');
                feedback.textContent = `❌ Неправильно. Правильный ответ: ${questionData.opts[correctOpt]}`;
                feedback.className = 'feedback wrong';
            }
            feedback.style.display = 'block';

            // Обновить результат
            updateResult();
        }

        // Подсчёт правильных ответов
        function countCorrect() {
            let correct = 0;
            topics.forEach((topic, tIdx) => {
                topic.questions.forEach((q, qIdx) => {
                    const options = document.querySelectorAll(`.option[data-topic="${tIdx}"][data-question="${qIdx}"]`);
                    let selectedCorrect = false;
                    options.forEach(opt => {
                        if (opt.classList.contains('selected') && parseInt(opt.dataset.option) === q.ans) {
                            selectedCorrect = true;
                        }
                    });
                    if (selectedCorrect) correct++;
                });
            });
            return correct;
        }

        function updateResult() {
            const correct = countCorrect();
            const total = 60;
            correctSpan.textContent = correct;
            const percent = Math.round((correct / total) * 100);
            percentSpan.textContent = percent;
            resultPanel.style.display = 'block';
        }

        // Проверить всё (показать результат)
        checkBtn.addEventListener('click', () => {
            updateResult();
            resultPanel.scrollIntoView({ behavior: 'smooth' });
        });

        // Сбросить
        resetBtn.addEventListener('click', () => {
            // Убрать все классы и скрыть обратную связь
            document.querySelectorAll('.option').forEach(opt => {
                opt.classList.remove('selected', 'correct', 'wrong');
            });
            document.querySelectorAll('.feedback').forEach(fb => {
                fb.style.display = 'none';
                fb.textContent = '';
                fb.className = 'feedback';
            });
            resultPanel.style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Инициализация
        render();
    })();
</script>
</body>
</html>
